version: "3.9"

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mindcare_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mindcare

  # ── Django Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mindcare_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=mindcare.settings
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DEBUG=False
      - DB_ENGINE=djongo
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=mindcare
    depends_on:
      - mongo
    working_dir: /app/backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn mindcare.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: mindcare_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  mongo_data:
